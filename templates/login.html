<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者登入 | Helen Hu Artlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
        }
        .btn-dark {
            border-radius: 8px;
            padding: 0.6rem;
            font-weight: 600;
        }
        .form-control {
            border-radius: 8px;
            padding: 0.75rem;
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <h3 class="fw-bold mb-4">🎨 後台管理登入</h3>
        <p class="text-muted mb-4">請輸入您的管理密碼以繼續</p>
        
        <form method="POST">
            <div class="mb-4 text-start">
                <label for="password" class="form-label small fw-bold">管理密碼</label>
                <input type="password" name="password" class="form-control" id="password" placeholder="請輸入密碼" required autofocus>
            </div>
            
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-dark">確認登入</button>
            </div>
        </form>
        
        <div class="mt-4">
            <a href="/" class="text-decoration-none small text-secondary">
                <i class="fas fa-arrow-left"></i> 返回藝廊首頁
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
</body>
</html>
