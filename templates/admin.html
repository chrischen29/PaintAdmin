<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helen Hu Art - 後台管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #6c5ce7; }
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .navbar { background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%); color: white; margin-bottom: 2rem; }
        .thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card { border: none; border-radius: 15px; }
        .form-label { font-weight: 600; color: #444; font-size: 0.85rem; margin-bottom: 4px; }
        .modal-content { border-radius: 20px; border: none; }
        .preview-container { text-align: center; background: #eee; border-radius: 10px; padding: 10px; min-height: 150px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .preview-img { max-width: 100%; max-height: 200px; display: none; border-radius: 5px; }
        .btn-primary { background-color: var(--primary-color); border: none; }
        .btn-primary:hover { background-color: #5849c4; }
    </style>
</head>
<body>

<nav class="navbar shadow-sm">
    <div class="container d-flex justify-content-between py-2">
        <span class="navbar-brand mb-0 h1 text-white">🎨 Helen Hu ARTLIST 管理系統</span>
        <button class="btn btn-light btn-sm fw-bold" onclick="openAddModal()">＋ 新增作品資料</button>
    </div>
</nav>

<div class="container">
    {% if error_msg %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <strong>提示：</strong> {{ error_msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}

    <div class="card shadow-sm p-3">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th width="100">預覽</th>
                        <th>作品名稱 / ID</th>
                        <th>規格 & 媒材</th>
                        <th>狀態</th>
                        <th width="150">操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in paintings %}
                    <tr>
                        <td>
                            <a href="{{ p.image_url }}" target="_blank">
                                <img src="{{ p.image_url }}" class="thumb" onerror="this.src='https://placehold.co/100x100?text=No+Image'">
                            </a>
                        </td>
                        <td>
                            <div class="fw-bold">{{ p.name }}</div>
                            <div class="text-muted small" style="font-size: 0.7rem;">{{ p.id }}</div>
                        </td>
                        <td>
                            <div class="small text-secondary">{{ p.size }}</div>
                            <div class="small text-secondary">{{ p.material }}</div>
                        </td>
                        <td>
                            {% if p.finish == 'y' %}
                            <span class="badge bg-success">已完成</span>
                            {% else %}
                            <span class="badge bg-warning text-dark">製作中</span>
                            {% endif %}
                        </td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary me-1" onclick='openEditModal({{ p|tojson }})'>編輯</button>
                            <form action="/admin" method="POST" class="d-inline">
                                <input type="hidden" name="action" value="delete_painting">
                                <input type="hidden" name="id" value="{{ p.id }}">
                                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('確定要永久刪除這件作品嗎？')">刪除</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="workModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <form action="/admin" method="POST" enctype="multipart/form-data" class="modal-content">
            <div class="modal-header border-0 bg-light">
                <h5 class="modal-title fw-bold" id="modalTitle">編輯作品</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4">
                <input type="hidden" name="action" id="formAction">
                <input type="hidden" name="id" id="field_id">
                <input type="hidden" name="old_image_url" id="field_old_img">

                <div class="row g-3">
                    <div class="col-md-8">
                        <div class="row g-2">
                            <div class="col-md-8">
                                <label class="form-label">作品名稱 *</label>
                                <input type="text" name="name" id="field_name" class="form-control" placeholder="請輸入作品標題" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">價格</label>
                                <input type="text" name="price" id="field_price" class="form-control" placeholder="NTD 0,000">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">尺寸規格</label>
                                <input type="text" name="size" id="field_size" class="form-control" placeholder="如: 40x40cm">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">使用媒材</label>
                                <input type="text" name="material" id="field_material" class="form-control" placeholder="如: 油畫、壓克力">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">完成日期</label>
                                <input type="text" name="display_date" id="field_date" class="form-control" placeholder="2024.04">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">狀態 (y:完成 / n:未完)</label>
                                <select name="finish" id="field_finish" class="form-select">
                                    <option value="y">y (已完成)</option>
                                    <option value="n">n (製作中)</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">製作天數</label>
                                <input type="text" name="lead_time" id="field_lead" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">裱框天數</label>
                                <input type="text" name="frame_time" id="field_frame" class="form-control">
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">作品圖片</label>
                        <div class="preview-container mb-2">
                            <img id="imagePreview" src="" class="preview-img">
                            <span id="previewText" class="text-muted small">尚未選取圖片</span>
                        </div>
                        <input type="file" name="file" id="fileInput" class="form-control form-control-sm" accept="image/*">
                        <div class="form-text" style="font-size: 0.7rem;">上傳新圖將自動取代舊圖</div>
                    </div>

                    <div class="col-12">
                        <label class="form-label">簡短描述</label>
                        <textarea name="description_short" id="field_desc" class="form-control" rows="1"></textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label">詩文內容 / 作品故事</label>
                        <textarea name="poetic_text" id="field_poetic" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">注意事項</label>
                        <textarea name="notices" id="field_notices" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">免責聲明</label>
                        <textarea name="hand_painted_disclaimer" id="field_disclaimer" class="form-control" rows="2"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                <button type="submit" class="btn btn-primary px-5">儲存並更新資料庫</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const workModal = new bootstrap.Modal(document.getElementById('workModal'));
    const imagePreview = document.getElementById('imagePreview');
    const previewText = document.getElementById('previewText');
    const fileInput = document.getElementById('fileInput');

    // 圖片預覽邏輯
    fileInput.onchange = evt => {
        const [file] = fileInput.files;
        if (file) {
            imagePreview.src = URL.createObjectURL(file);
            imagePreview.style.display = 'block';
            previewText.style.display = 'none';
        }
    }

    function openAddModal() {
        document.getElementById('modalTitle').innerText = "✨ 新增全新作品";
        document.getElementById('formAction').value = "add_painting";
        document.getElementById('field_id').value = "";
        document.getElementById('field_old_img').value = "";
        document.querySelector('form.modal-content').reset();
        
        imagePreview.style.display = 'none';
        previewText.style.display = 'block';
        workModal.show();
    }

    function openEditModal(p) {
        document.getElementById('modalTitle').innerText = "📝 編輯作品: " + p.name;
        document.getElementById('formAction').value = "edit_painting";
        document.getElementById('field_id').value = p.id;
        document.getElementById('field_old_img').value = p.image_url;

        // 填充欄位
        document.getElementById('field_name').value = p.name || '';
        document.getElementById('field_price').value = p.price || '';
        document.getElementById('field_finish').value = p.finish || 'y';
        document.getElementById('field_size').value = p.size || '';
        document.getElementById('field_material').value = p.material || '';
        document.getElementById('field_date').value = p.display_date || '';
        document.getElementById('field_desc').value = p.description_short || '';
        document.getElementById('field_poetic').value = p.poetic_text || '';
        document.getElementById('field_notices').value = p.notices || '';
        document.getElementById('field_lead').value = p.lead_time || '';
        document.getElementById('field_frame').value = p.frame_time || '';
        document.getElementById('field_disclaimer').value = p.hand_painted_disclaimer || '';

        // 預覽舊圖
        if(p.image_url) {
            imagePreview.src = p.image_url;
            imagePreview.style.display = 'block';
            previewText.style.display = 'none';
        } else {
            imagePreview.style.display = 'none';
            previewText.style.display = 'block';
        }

        workModal.show();
    }
</script>
</body>
</html>
