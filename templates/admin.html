<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <title>全功能管理後台 | Helen Hu Art</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>🎨 網站全功能管理</h2>
            <a href="/logout" class="btn btn-outline-danger">登出</a>
        </div>

        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-dark text-white">基本資訊編輯 (畫家介紹、匯款資訊)</div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="action" value="update_info">
                    <div class="row g-3">
                        <div class="col-md-4"><label>畫家名稱</label><input type="text" name="artist_name" class="form-control" value="{{ info.artist_name }}"></div>
                        <div class="col-md-4"><label>銀行代號</label><input type="text" name="bank_code" class="form-control" value="{{ info.bank_code }}"></div>
                        <div class="col-md-4"><label>戶名</label><input type="text" name="bank_user" class="form-control" value="{{ info.bank_user }}"></div>
                        <div class="col-12"><label>銀行帳號</label><input type="text" name="bank_account" class="form-control" value="{{ info.bank_account }}"></div>
                        <div class="col-12"><label>畫家簡介</label><textarea name="artist_intro" class="form-control" rows="3">{{ info.artist_intro }}</textarea></div>
                    </div>
                    <button type="submit" class="btn btn-primary mt-3">儲存基本資訊</button>
                </form>
            </div>
        </div>

        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-success text-white">新增畫作</div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="action" value="add_painting">
                    <div class="row g-3">
                        <div class="col-md-6"><label>作品名稱</label><input type="text" name="name" class="form-control" required></div>
                        <div class="col-md-3"><label>價格</label><input type="text" name="price" class="form-control"></div>
                        <div class="col-md-3"><label>日期 (YYYY-MM-DD)</label><input type="date" name="display_date" class="form-control"></div>
                        <div class="col-md-4"><label>尺寸</label><input type="text" name="size" class="form-control"></div>
                        <div class="col-md-4"><label>媒材</label><input type="text" name="material" class="form-control"></div>
                        <div class="col-md-4"><label>狀態</label><select name="finish" class="form-select"><option value="N">展示中</option><option value="Y">已蒙收藏</option></select></div>
                        <div class="col-12"><label>詩意描述</label><textarea name="poetic_text" class="form-control"></textarea></div>
                        <div class="col-12"><label>上傳圖片</label><input type="file" name="file" class="form-control" accept="image/*" required></div>
                    </div>
                    <button type="submit" class="btn btn-success mt-3">上傳並新增作品</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-secondary text-white">作品列表管理</div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead><tr><th>圖片</th><th>名稱</th><th>操作</th></tr></thead>
                    <tbody>
                        {% for p in paintings %}
                        <tr>
                            <td><img src="{{ p.image_url }}" style="height: 50px; width: 50px; object-fit: cover;"></td>
                            <td>{{ p.name }}</td>
                            <td>
                                <form method="POST" onsubmit="return confirm('確定要刪除嗎？')">
                                    <input type="hidden" name="action" value="delete_painting">
                                    <input type="hidden" name="id" value="{{ p.id }}">
                                    <button class="btn btn-sm btn-danger">刪除</button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
