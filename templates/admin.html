<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>畫廊管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }
        .form-label { font-weight: bold; font-size: 0.9rem; margin-bottom: 2px; }
        .modal-lg { max-width: 900px; }
    </style>
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>🎨 作品管理後台</h2>
        <button class="btn btn-primary" onclick="openAddModal()">＋ 新增作品</button>
    </div>

    {% if error_msg %}<div class="alert alert-danger">{{ error_msg }}</div>{% endif %}

    <div class="card shadow-sm">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
                <tr>
                    <th>預覽</th><th>名稱</th><th>ID</th><th>狀態</th><th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for p in paintings %}
                <tr>
                    <td><img src="{{ p.image_url }}" class="thumb"></td>
                    <td>{{ p.name }}</td>
                    <td class="text-muted small">{{ p.id }}</td>
                    <td><span class="badge {{ 'bg-success' if p.finish=='y' else 'bg-warning text-dark' }}">{{ '完成' if p.finish=='y' else '未完' }}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick='openEditModal({{ p|tojson }})'>編輯</button>
                        <form action="/admin" method="POST" class="d-inline">
                            <input type="hidden" name="action" value="delete_painting"><input type="hidden" name="id" value="{{ p.id }}">
                            <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('確定刪除?')">刪除</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="workModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <form action="/admin" method="POST" enctype="multipart/form-data" class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">編輯作品</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body row g-3">
                <input type="hidden" name="action" id="formAction">
                <input type="hidden" name="id" id="field_id">
                <input type="hidden" name="old_image_url" id="field_old_img">

                <div class="col-md-6"><label class="form-label">作品名稱</label><input type="text" name="name" id="field_name" class="form-control" required></div>
                <div class="col-md-3"><label class="form-label">價格</label><input type="text" name="price" id="field_price" class="form-control"></div>
                <div class="col-md-3"><label class="form-label">完成狀態 (y/n)</label><input type="text" name="finish" id="field_finish" class="form-control"></div>
                
                <div class="col-md-4"><label class="form-label">尺寸</label><input type="text" name="size" id="field_size" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">媒材</label><input type="text" name="material" id="field_material" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">完成日期</label><input type="text" name="display_date" id="field_date" class="form-control"></div>

                <div class="col-12"><label class="form-label">圖片編輯 (若不修改請留空)</label><input type="file" name="file" class="form-control"></div>
                
                <div class="col-md-12"><label class="form-label">簡短描述</label><textarea name="description_short" id="field_desc" class="form-control" rows="2"></textarea></div>
                <div class="col-md-12"><label class="form-label">詩文內容</label><textarea name="poetic_text" id="field_poetic" class="form-control" rows="3"></textarea></div>
                <div class="col-md-12"><label class="form-label">注意事項</label><textarea name="notices" id="field_notices" class="form-control" rows="2"></textarea></div>

                <div class="col-md-4"><label class="form-label">製作天數</label><input type="text" name="lead_time" id="field_lead" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">裱框時間</label><input type="text" name="frame_time" id="field_frame" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">免責聲明 (手繪差距)</label><input type="text" name="hand_painted_disclaimer" id="field_disclaimer" class="form-control text-truncate"></div>
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-primary w-100">儲存變更</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const modal = new bootstrap.Modal(document.getElementById('workModal'));
    function openAddModal() {
        document.getElementById('modalTitle').innerText = "新增作品";
        document.getElementById('formAction').value = "add_painting";
        document.querySelector('form').reset();
        modal.show();
    }
    function openEditModal(p) {
        document.getElementById('modalTitle').innerText = "編輯作品: " + p.name;
        document.getElementById('formAction').value = "edit_painting";
        document.getElementById('field_id').value = p.id;
        document.getElementById('field_old_img').value = p.image_url;
        document.getElementById('field_name').value = p.name;
        document.getElementById('field_price').value = p.price;
        document.getElementById('field_finish').value = p.finish;
        document.getElementById('field_size').value = p.size;
        document.getElementById('field_material').value = p.material;
        document.getElementById('field_date').value = p.display_date;
        document.getElementById('field_desc').value = p.description_short;
        document.getElementById('field_poetic').value = p.poetic_text;
        document.getElementById('field_notices').value = p.notices;
        document.getElementById('field_lead').value = p.lead_time;
        document.getElementById('field_frame').value = p.frame_time;
        document.getElementById('field_disclaimer').value = p.hand_painted_disclaimer;
        modal.show();
    }
</script>
</body>
</html>
