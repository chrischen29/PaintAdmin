<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helen Hu Art - 管理後台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .admin-header { background: #343a40; color: white; padding: 20px 0; margin-bottom: 30px; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 10px; }
        .painting-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; }
        .table vertical-align: middle;
        .btn-edit { background-color: #ffc107; color: #000; }
        .btn-edit:hover { background-color: #e0a800; }
    </style>
</head>
<body>

<div class="admin-header text-center">
    <h1>🎨 畫廊管理後台</h1>
    <p>管理 Helen Hu 的藝術作品紀錄</p>
</div>

<div class="container mb-5">
    {% if error_msg %}
    <div class="alert alert-danger">{{ error_msg }}</div>
    {% endif %}

    <div class="card mb-4">
        <div class="card-header bg-primary text-white"><h5>新增畫作</h5></div>
        <div class="card-body">
            <form action="{{ url_for('admin') }}" method="POST" enctype="multipart/form-data" class="row g-3">
                <input type="hidden" name="action" value="add_painting">
                <div class="col-md-4">
                    <label class="form-label">畫作名稱</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label">價格</label>
                    <input type="text" name="price" class="form-control" placeholder="例如: 5,000">
                </div>
                <div class="col-md-3">
                    <label class="form-label">尺寸</label>
                    <input type="text" name="size" class="form-control" placeholder="例如: 40x40cm">
                </div>
                <div class="col-md-3">
                    <label class="form-label">完成日期</label>
                    <input type="date" name="display_date" class="form-control">
                </div>
                <div class="col-md-12">
                    <label class="form-label">上傳圖片</label>
                    <input type="file" name="file" class="form-control" accept="image/*" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-success w-100">確認上傳並存至 Google Sheets</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">作品清單</h5>
            <span class="badge bg-secondary">共 {{ paintings|length }} 幅</span>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>預覽</th>
                        <th>名稱</th>
                        <th>ID</th>
                        <th class="text-end">操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in paintings %}
                    <tr>
                        <td><img src="{{ p.image_url }}" class="painting-thumb"></td>
                        <td class="align-middle fw-bold">{{ p.name }}</td>
                        <td class="align-middle text-muted">{{ p.id }}</td>
                        <td class="align-middle text-end">
                            <button class="btn btn-sm btn-edit" onclick='openEditModal({{ p|tojson }})'>編輯</button>
                            <form action="{{ url_for('admin') }}" method="POST" class="d-inline">
                                <input type="hidden" name="action" value="delete_painting">
                                <input type="hidden" name="id" value="{{ p.id }}">
                                <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('確定要刪除這幅畫嗎？')">刪除</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form action="{{ url_for('admin') }}" method="POST">
                <div class="modal-header">
                    <h5 class="modal-title">編輯畫作資訊</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="action" value="edit_painting">
                    <input type="hidden" name="id" id="edit_id">
                    
                    <div class="mb-3">
                        <label class="form-label">畫作名稱</label>
                        <input type="text" name="name" id="edit_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">價格</label>
                        <input type="text" name="price" id="edit_price" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">尺寸</label>
                        <input type="text" name="size" id="edit_size" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">詩文內容</label>
                        <textarea name="poetic_text" id="edit_poetic" class="form-control" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">儲存更動</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function openEditModal(painting) {
        document.getElementById('edit_id').value = painting.id;
        document.getElementById('edit_name').value = painting.name;
        document.getElementById('edit_price').value = painting.price || '';
        document.getElementById('edit_size').value = painting.size || '';
        document.getElementById('edit_poetic').value = painting.poetic_text || '';
        
        var editModal = new bootstrap.Modal(document.getElementById('edit_modal'));
        editModal.show();
    }
</script>
</body>
</html>
