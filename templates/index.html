    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        body { background-color: #fcfcfc; font-family: 'Noto Sans TC', sans-serif; color: #333; }
        .nav-tabs .nav-link { color: #555; border: none; padding: 1rem 2rem; font-weight: 500; }
        .nav-tabs .nav-link.active { color: #000; border-bottom: 3px solid #000; background: none; }
        .portfolio-card { transition: all 0.3s ease; border: none; cursor: pointer; background: #fff; height: 100%; display: flex; flex-direction: column; }
        .portfolio-card:hover { transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
        .img-container { height: 380px; display: flex; align-items: center; justify-content: center; background-color: #f9f9f9; overflow: hidden; padding: 5px; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .card-info { padding: 15px 10px; background-color: #fff; text-align: center; }
        .painting-name { font-size: 1.05rem; font-weight: 600; margin-bottom: 0; }
        .sold-out-badge { background-color: #b0413e; color: #fff; font-size: 0.75rem; padding: 2px 8px; border-radius: 6px; margin-left: 8px; }
        .artist-img { max-width: 300px; border-radius: 50%; border: 8px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .art-description { border-left: 4px solid #198754; padding: 1rem; background-color: #f8f9fa; font-style: italic; white-space: pre-line; }
        .price-tag { color: #dc3545; font-weight: bold; font-size: 1.5rem; }
        .social-link { transition: transform 0.2s ease; display: inline-block; text-decoration: none; }
        .social-link:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="fw-bold">Helen Hu Artlist</h1>
            <p class="text-muted">探索色彩與靈魂的對話</p>
        </header>

        <ul class="nav nav-tabs justify-content-center" id="artistTab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#portfolio-pane" type="button">作品展示</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#about-pane" type="button">畫家介紹</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#payment-pane" type="button">匯款資訊</button></li>
        </ul>

        <div class="tab-content mt-4" id="artistTabContent">
            <div class="tab-pane fade show active" id="portfolio-pane" role="tabpanel">
                <div class="row g-4" id="portfolio-container">
                    <div class="text-center py-5">
                        <div class="spinner-border text-secondary" role="status"></div>
                        <p class="mt-2">正在佈置畫廊...</p>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="about-pane" role="tabpanel">
                <div class="row align-items-center">
                    <div class="col-md-5 text-center mb-4">
                        <img src="https://paintadmin.onrender.com/static/images/S__50290851.jpg" class="artist-img" alt="胡敏慧" onerror="this.src='https://placehold.co/300x300?text=Helen+Hu'">
                    </div>
                    <div class="col-md-7">
                        <h2 class="mb-3">胡敏慧</h2>
                        <p>願我的畫可以帶給您內心的寧靜，溫暖的療癒，充沛的力量。</p>
                        <p>讓我在您心裡種下一顆種子，並都能擁抱它茁長後的愉悅芳華💝</p>
                        <div class="mt-4">
                            <a href="https://line.me/ti/p/2NZ3g9WyfB" target="_blank" class="social-link me-3"><i class="fa-brands fa-line fa-2x" style="color: #06C755;"></i></a>
                            <a href="https://www.facebook.com/helen.hu.1042" target="_blank" class="social-link me-3"><i class="fa-brands fa-facebook fa-2x" style="color: #1877F2;"></i></a>
                            <a href="mailto:hooli300h@yahoo.com.tw" class="social-link"><i class="fa-solid fa-envelope fa-2x" style="color: #333;"></i></a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="payment-pane" role="tabpanel">
                <div class="row justify-content-center">
                    <div class="col-lg-8 card p-4 border-0 shadow-sm rounded-4">
                        <h3 class="fw-bold mb-4">【匯款資訊】</h3>
                        <p>郵局代號：<code>700</code></p>
                        <p>帳號：<code>0311771-0085840</code></p>
                        <p>戶名：胡敏慧</p>
                        <div class="alert alert-warning mt-3">匯款後請提供帳號後五碼、姓名與聯絡電話，感謝支持！</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-container"></div>

    <footer class="text-center py-4 border-top mt-5">
        <p class="text-muted small">&copy; 2026 Helen Hu Artlist. Designed by Chris.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const sheetId = '1EPiV8x-LYpPA0loGib2Se69tsdhvHLrZ_pvLZW65USo';
            const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;

            const portfolioContainer = document.getElementById('portfolio-container');
            const modalContainer = document.getElementById('modal-container');

            // 輔助函式：將路徑修正為 paintadmin 的網址
            function formatImagePath(rawPath) {
                if (!rawPath) return 'https://placehold.co/600x400?text=No+Image';
                let path = rawPath.trim();
                
                // 如果已經是完整網址，直接回傳
                if (path.startsWith('http')) return path;

                // 移除手寫的多餘路徑
                let fileName = path.replace(/^\/?static\/images\//, '')
                                   .replace(/^\/?images\//, '')
                                   .replace(/^\//, '');

                // 強制指向您的管理網站圖片路徑
                return `https://paintadmin.onrender.com/static/images/${fileName}`;
            }

            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                complete: function (results) {
                    let paintings = (results.data || []).filter(item => item.name && item.name.trim() !== '');
                    
                    paintings.sort((a, b) => new Date(b.display_date || 0) - new Date(a.display_date || 0));

                    let cardsHtml = '';
                    let modalsHtml = '';

                    paintings.forEach((item, index) => {
                        const imgUrl = formatImagePath(item.image_url);
                        const soldOut = (item.finish && item.finish.toLowerCase() === 'y') ? '<span class="sold-out-badge">已蒙收藏</span>' : '';
                        const poeticText = item.poetic_text ? item.poetic_text.replace(/\n/g, '<br>') : '';

                        cardsHtml += `
                            <div class="col-md-4 col-sm-6">
                                <div class="card portfolio-card shadow-sm" data-bs-toggle="modal" data-bs-target="#detailModal${index}">
                                    <div class="img-container">
                                        <img src="${imgUrl}" alt="${item.name}" onerror="this.src='https://placehold.co/400x400?text=圖片路徑錯誤'">
                                    </div>
                                    <div class="card-info">
                                        <p class="painting-name">${item.name}${soldOut}</p>
                                    </div>
                                </div>
                            </div>`;

                        modalsHtml += `
                            <div class="modal fade" id="detailModal${index}" tabindex="-1">
                                <div class="modal-dialog modal-lg modal-dialog-centered">
                                    <div class="modal-content border-0 shadow-lg">
                                        <div class="modal-header">
                                            <h5 class="modal-title fw-bold">${item.name}</h5>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <div class="modal-body p-4">
                                            <div class="row">
                                                <div class="col-md-5 mb-4 mb-md-0 text-center">
                                                    <img src="${imgUrl}" class="img-fluid rounded shadow-sm" style="max-height: 70vh;" onerror="this.src='https://placehold.co/400x400?text=圖片尚未上傳'">
                                                </div>
                                                <div class="col-md-7">
                                                    <div class="price-tag mb-3">${item.price || ''}</div>
                                                    <p class="small mb-1"><strong>尺寸：</strong>${item.size || ''}</p>
                                                    <p class="small mb-1"><strong>媒材：</strong>${item.material || ''}</p>
                                                    <div class="art-description rounded mt-3 small">${poeticText}</div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="modal-footer">
                                            <a href="https://line.me/ti/p/2NZ3g9WyfB" target="_blank" class="btn btn-success btn-sm"><i class="fa-brands fa-line me-1"></i>LINE 詢問</a>
                                            <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">關閉</button>
                                        </div>
                                    </div>
                                </div>
                            </div>`;
                    });

                    portfolioContainer.innerHTML = cardsHtml || '<div class="text-center py-5 w-100">目前尚無作品資料。</div>';
                    modalContainer.innerHTML = modalsHtml;
                }
            });
        });
    </script>
</body>
</html>
