<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <base href="/">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Helen Hu Artlist｜胡敏慧的藝廊：貓也喜歡的畫、淺藍色的夢。作品展示、畫家介紹與匯款資訊。">
    <title>Helen Hu Artlist</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        body { background-color: #fcfcfc; font-family: 'Noto Sans TC', sans-serif; color: #333; }
        .nav-tabs .nav-link { color: #555; border: none; padding: 1rem 2rem; font-weight: 500; }
        .nav-tabs .nav-link.active { color: #000; border-bottom: 3px solid #000; background: none; }
        .portfolio-card { transition: all 0.3s ease; border: none; cursor: pointer; overflow: hidden; background: #fff; height: 100%; display: flex; flex-direction: column; }
        .portfolio-card:hover { transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.12) !important; }
        .img-container { height: 380px; display: flex; align-items: center; justify-content: center; background-color: #f9f9f9; overflow: hidden; padding: 5px; }
        .portfolio-card img { max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; display: block; }
        .card-info { padding: 15px 10px; background-color: #fff; margin-top: auto; }
        .card-info .painting-name { font-size: 1.05rem; font-weight: 600; color: #222; margin-bottom: 0; text-align: center; }
        .sold-out-badge { background-color: #b0413e; color: #ffffff; font-size: 0.75rem; padding: 2px 8px; border-radius: 6px; margin-left: 8px; display: inline-block; }
        .artist-img { max-width: 300px; border-radius: 50%; border: 8px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .art-description { border-left: 4px solid #198754; padding-left: 1rem; background-color: #f8f9fa; font-style: italic; white-space: pre-line; }
        .price-tag { color: #dc3545; font-weight: bold; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="fw-bold">Helen Hu Artlist</h1>
            <p class="text-muted">探索色彩與靈魂的對話</p>
            <a href="/login" class="btn btn-sm btn-light text-muted" style="font-size: 10px;">管理登入</a>
        </header>

        <ul class="nav nav-tabs justify-content-center" id="artistTab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#portfolio-pane" type="button">作品展示</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#about-pane" type="button">畫家介紹</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#payment-pane" type="button">匯款資訊</button></li>
        </ul>

        <div class="tab-content mt-4" id="artistTabContent">
            <div class="tab-pane fade show active" id="portfolio-pane" role="tabpanel">
                <div class="row g-4" id="portfolio-container">
                    <div class="text-center py-5">
                        <div class="spinner-border text-secondary" role="status"></div>
                        <p class="mt-2">正在佈置畫廊...</p>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="about-pane" role="tabpanel">
                <div class="row align-items-center">
                    <div class="col-md-5 text-center mb-4">
                        <img src="/static/images/S__50290851.jpg" class="artist-img" alt="胡敏慧畫家">
                    </div>
                    <div class="col-md-7">
                        <h2 class="mb-3">胡敏慧</h2>
                        <p>願我的畫可以帶給您內心的寧靜，溫暖的療癒，充沛的力量。</p>
                        <p>讓我在您心裡種下一顆種子，並都能擁抱它茁長後的愉悅芳華💝</p>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="payment-pane" role="tabpanel">
                <div class="row justify-content-center">
                    <div class="col-lg-8 card p-4 shadow-sm">
                        <h3 class="fw-bold mb-4">【匯款資訊】</h3>
                        <p>郵局代號：<code>700</code></p>
                        <p>帳號：<code>0311771-0085840</code></p>
                        <p>戶名：胡敏慧</p>
                        <div class="alert alert-warning">匯款後請來信或 LINE 告知帳號末五碼，感謝支持！</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-container"></div>

    <footer class="text-center py-4 border-top mt-5">
        <p class="text-muted small">&copy; 2026 Helen Hu Artlist. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const sheetId = '1EPiV8x-LYpPA0loGib2Se69tsdhvHLrZ_pvLZW65USo';
            const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;

            const portfolioContainer = document.getElementById('portfolio-container');
            const modalContainer = document.getElementById('modal-container');

            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                complete: function (results) {
                    let paintings = results.data.filter(item => item.name);
                    let cardsHtml = '';
                    let modalsHtml = '';

                    paintings.forEach((item, index) => {
                        let soldOutTag = (item.finish === 'y') ? `<span class="sold-out-badge">已蒙收藏</span>` : '';
                        
                        // --- 強化的圖片路徑處理邏輯 ---
                        let imgPath = item.image_url ? item.image_url.trim() : "";
                        
                        // 如果路徑不包含 http (外部連結) 且不包含 /static/ (完整路徑)
                        // 就自動幫它補上 /static/images/ 前綴
                        if (imgPath && !imgPath.startsWith('http') && !imgPath.startsWith('/static/')) {
                            // 去掉可能重複的 images/ 字眼
                            imgPath = imgPath.replace(/^images\//, "");
                            imgPath = '/static/images/' + imgPath;
                        }

                        cardsHtml += `
                            <div class="col-md-4 col-sm-6">
                                <div class="card portfolio-card shadow-sm" data-bs-toggle="modal" data-bs-target="#detailModal${index}">
                                    <div class="img-container">
                                        <img src="${imgPath}" alt="${item.name}" onerror="this.src='https://placehold.co/400x400?text=Image+Not+Found'">
                                    </div>
                                    <div class="card-info">
                                        <p class="painting-name">${item.name}${soldOutTag}</p>
                                    </div>
                                </div>
                            </div>`;

                        modalsHtml += `
                            <div class="modal fade" id="detailModal${index}" tabindex="-1">
                                <div class="modal-dialog modal-lg modal-dialog-centered">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <h5 class="modal-title fw-bold">${item.name}</h5>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <div class="modal-body p-4">
                                            <div class="row">
                                                <div class="col-md-6 text-center">
                                                    <img src="${imgPath}" class="img-fluid rounded shadow-sm" style="max-height: 500px;" onerror="this.src='https://placehold.co/400x400?text=Image+Not+Found'">
                                                </div>
                                                <div class="col-md-6">
                                                    <div class="price-tag mb-3">${item.price || ''}</div>
                                                    <p class="mb-1"><strong>尺寸：</strong>${item.size || ''}</p>
                                                    <p class="mb-3"><strong>媒材：</strong>${item.material || ''}</p>
                                                    <div class="art-description p-3 rounded small">${item.poetic_text || ''}</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>`;
                    });

                    portfolioContainer.innerHTML = cardsHtml;
                    modalContainer.innerHTML = modalsHtml;
                }
            });
        });
    </script>
</body>
</html>
